# TODO: Define 3 services: db, api, frontend
#
# Requirements:
# - db: postgres:17-alpine, env_file .env, healthcheck
# - api: build from ./Dockerfile, port 8080, depends_on db, env_file .env
# - frontend: build from ./frontend/Dockerfile, port 8501, depends_on api, env 

version: "3.9"
services:
  db:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
   
  
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8080:8080"
    volumes:
      - .:/app
  frontend:
    build:
        context: ./frontend
        dockerfile: Dockerfile
    container_name: frontend
    restart: always
    depends_on:
      - api
    env_file:
      - .env
    environment:
      API_URL: ${API_URL}
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/frontend
volumes:
  db_data:
